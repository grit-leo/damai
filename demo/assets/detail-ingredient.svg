  <rect width="900" height="1200" fill="#f8fafc"/>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#111827">配方详情图</text>
  <rect x="80" y="180" width="740" height="820" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
